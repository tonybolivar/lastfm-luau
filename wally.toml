[package]
name = "tonybolivar/lastfm-luau"
version = "0.1.0"
description = "Last.fm API client for Luau (Roblox + Lune). Typed, async, with DataStore-backed session persistence."
license = "MIT"
registry = "https://github.com/UpliftGames/wally-index"
realm = "shared"
authors = ["Tony Bolivar <tony.e.bolivar@gmail.com>"]
repository = "https://github.com/tonybolivar/lastfm-luau"
homepage = "https://github.com/tonybolivar/lastfm-luau"
include = ["src/**", "wally.toml", "LICENSE", "README.md"]

[dependencies]
Future = "yetanotherclown/luau-futures@2.0.0-beta.3"
Md5    = "dekkonot/md5@^1.0.0"

[dev-dependencies]
Tiniest = "dphfox/tiniest@^0.1.0"
