[package]
name = "tonybolivar/lastfm-luau"
version = "1.0.3"
description = "Last.fm API client for Luau (Roblox + Lune). Typed, async, with DataStore-backed session persistence."
license = "MIT"
registry = "https://github.com/UpliftGames/wally-index"
realm = "shared"
authors = ["Tony Bolivar <tony.e.bolivar@gmail.com>"]
repository = "https://github.com/tonybolivar/lastfm-luau"
homepage = "https://github.com/tonybolivar/lastfm-luau"
include = ["src/**", "wally.toml", "LICENSE", "README.md", "default.project.json"]
exclude = [
	"tests/**",
	"tests",
	"examples/**",
	"examples",
	"scripts/**",
	"scripts",
	".github/**",
	".github",
	"tmp/**",
	"tmp",
	"images/**",
	"images",
	"rokit.toml",
	"selene.toml",
	"stylua.toml",
	".luaurc",
	".gitignore",
	"wally.lock",
	"sourcemap.json",
	"*.zip",
]

# lastfm-luau ships self-contained: pure-Luau MD5 in src/Md5.luau, a small
# Future/Result implementation in src/Future.luau, and a minimal in-tree test
# framework. No runtime or dev dependencies. If you'd rather pin to upstream
# implementations, the obvious swaps are:
#   - dekkonot/md5  (replaces src/Md5.luau)
#   - yetanotherclown/luau-futures  (replaces src/Future.luau)
#   - dphfox/tiniest  (replaces tests/Framework.luau)
[dependencies]

[dev-dependencies]
